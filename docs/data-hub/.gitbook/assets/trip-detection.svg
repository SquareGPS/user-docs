<svg viewBox="0 0 1400 900" width="2000" height="1286" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-purple">
      <stop offset="0%" stop-color="#9D4EDD" stop-opacity="1" />
      <stop offset="100%" stop-color="#5A189A" stop-opacity="0.8" />
    </radialGradient>
    
    <radialGradient id="grad-orange">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="1" />
      <stop offset="100%" stop-color="#E67E00" stop-opacity="0.8" />
    </radialGradient>
    
    <radialGradient id="grad-cyan">
      <stop offset="0%" stop-color="#4DD4E8" stop-opacity="1" />
      <stop offset="100%" stop-color="#0097A7" stop-opacity="0.8" />
    </radialGradient>
    
    <radialGradient id="grad-gray">
      <stop offset="0%" stop-color="#546E7A" stop-opacity="1" />
      <stop offset="100%" stop-color="#37474F" stop-opacity="0.8" />
    </radialGradient>
  </defs>
  
  <rect width="1400" height="900" fill="#1A1D2E"/>
  
  <text x="700" y="50" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#E0E0E0">Trip Detection State Machine</text>
  
  <!-- State 1: No Trip -->
  <ellipse cx="250" cy="220" rx="138" ry="83" fill="#607D8B" opacity="0.3"/>
  <ellipse cx="250" cy="220" rx="130" ry="75" fill="url(#grad-gray)" stroke="#607D8B" stroke-width="2"/>
  <circle cx="250" cy="220" r="15" fill="none" stroke="#90A4AE" stroke-width="2"/>
  <circle cx="250" cy="220" r="10" fill="#1A1D2E" stroke="#B0BEC5" stroke-width="2"/>
  <text x="250" y="270" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#B0BEC5">No Trip</text>
  
  <!-- Transition labels -->
  <text x="480" y="110" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E0E0E0">First tracking point</text>
  <text x="480" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#90A4AE">Movement after parking</text>
  <text x="480" y="152" text-anchor="middle" font-family="Arial" font-size="10" fill="#7B68EE">≥ min_parking_seconds</text>
  <text x="480" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#90A4AE">OR</text>
  <text x="480" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#90A4AE">Movement after gap</text>
  <text x="480" y="227" text-anchor="middle" font-family="Arial" font-size="10" fill="#7B68EE">≥ tracks_split_timeout_seconds</text>
  
  <path d="M 380 200 Q 480 160, 560 200" stroke="#78909C" stroke-width="2" fill="none"/>
  <polygon points="560 200, 552 196, 552 204" fill="#78909C"/>
  
  <!-- State 2: Trip In Progress -->
  <ellipse cx="700" cy="220" rx="158" ry="93" fill="#9D4EDD" opacity="0.3"/>
  <ellipse cx="700" cy="220" rx="150" ry="85" fill="url(#grad-purple)" stroke="#9D4EDD" stroke-width="2"/>
  <text x="700" y="220" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">Trip In</text>
  <text x="700" y="242" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">Progress</text>
  
  <text x="925" y="135" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E0E0E0">Parking detected</text>
  <text x="925" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#7B68EE">≥ min_parking_seconds</text>
  <text x="925" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#90A4AE">OR</text>
  <text x="925" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E0E0E0">Data gap detected</text>
  <text x="925" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#7B68EE">≥ tracks_split_timeout_seconds</text>
  
  <path d="M 850 220 L 960 220" stroke="#78909C" stroke-width="2" fill="none"/>
  <polygon points="960 220, 952 216, 952 224" fill="#78909C"/>
  
  <!-- State 3: Trip Ended -->
  <ellipse cx="1100" cy="220" rx="138" ry="83" fill="#FFB347" opacity="0.3"/>
  <ellipse cx="1100" cy="220" rx="130" ry="75" fill="url(#grad-orange)" stroke="#FFB347" stroke-width="2"/>
  <circle cx="1100" cy="220" r="15" fill="none" stroke="#FFD699" stroke-width="2"/>
  <circle cx="1100" cy="220" r="8" fill="#FF9500"/>
  <text x="1100" y="270" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#FFFFFF">Trip Ended</text>
  
  <path d="M 1100 295 L 1100 450 Q 1100 500, 850 580" stroke="#78909C" stroke-width="2" fill="none"/>
  <polygon points="850 580, 854 572, 846 575" fill="#78909C"/>
  
  <!-- State 4: Validate & Save -->
  <polygon points="700,545 875,650 700,755 525,650" fill="#4DD4E8" opacity="0.3"/>
  <polygon points="700,550 870,650 700,750 530,650" fill="url(#grad-cyan)" stroke="#4DD4E8" stroke-width="2"/>
  <text x="700" y="645" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#FFFFFF">Validate &amp;</text>
  <text x="700" y="668" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#FFFFFF">Save</text>
  
  <!-- Quality checks box -->
  <rect x="950" y="580" width="280" height="140" rx="8" fill="#252836" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="1090" y="610" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#B0B0C0">QUALITY CHECKS:</text>
  <line x1="970" y1="620" x2="1210" y2="620" stroke="#7B68EE" stroke-width="1" opacity="0.3"/>
  <text x="970" y="645" font-family="Arial" font-size="11" fill="#90A4AE">▸  2 points</text>
  <text x="970" y="670" font-family="Arial" font-size="11" fill="#90A4AE">▸  min_distance_meters</text>
  <text x="970" y="695" font-family="Arial" font-size="11" fill="#90A4AE">▸  min_speed_kmh</text>
  
  <!-- Success path -->
  <path d="M 530 650 Q 380 650, 300 500 Q 250 400, 250 295" stroke="#4CAF50" stroke-width="2.5" fill="none"/>
  <polygon points="250 295, 246 303, 254 303" fill="#4CAF50"/>
  
  <text x="350" y="638" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#4CAF50">Save trip</text>
  <rect x="310" y="653" width="120" height="20" rx="4" fill="#1A1D2E" stroke="#4CAF50" stroke-width="1"/>
  <text x="370" y="667" text-anchor="middle" font-family="Arial" font-size="10" fill="#66BB6A">☑ Pass quality checks</text>
  
  <!-- Failure path -->
  <path d="M 600 570 Q 450 450, 350 370 Q 250 310, 250 295" stroke="#F44336" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <polygon points="250 295, 246 303, 254 303" fill="#F44336"/>
  
  <text x="380" y="448" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#F44336">Discard trip</text>
  <rect x="325" y="460" width="110" height="20" rx="4" fill="#1A1D2E" stroke="#F44336" stroke-width="1"/>
  <text x="380" y="474" text-anchor="middle" font-family="Arial" font-size="10" fill="#EF5350">☒ Fail quality checks</text>
</svg>